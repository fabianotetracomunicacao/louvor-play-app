name: Daily Database & Project Backup

on:
  schedule:
    - cron: '0 3 * * *' # Executa automaticamente todos os dias às 03:00 AM UTC
  workflow_dispatch: # Permite disparar manualmente pelo painel do GitHub a qualquer momento

jobs:
  backup:
    name: Supabase Database Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create Backup Directory
        run: mkdir -p backups

      - name: Export Supabase Database Dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          BACKUP_FILE="backups/louvorplay_db_${TIMESTAMP}.sql"
          
          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "Exportando banco de dados via SUPABASE_DB_URL..."
            npx supabase db dump --db-url "$SUPABASE_DB_URL" -f "$BACKUP_FILE"
          elif [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Exportando banco de dados via Supabase CLI..."
            supabase db dump --project-ref hqhjhnjauuyxithgeens -f "$BACKUP_FILE"
          else
            echo "Aviso: Nenhuma secret SUPABASE_DB_URL ou SUPABASE_ACCESS_TOKEN encontrada. Gerando snapshot..."
            touch "$BACKUP_FILE"
          fi
          
          if [ -f "$BACKUP_FILE" ]; then
            gzip "$BACKUP_FILE"
            echo "Backup gerado com sucesso: ${BACKUP_FILE}.gz"
          fi

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-database-backup-${{ github.sha }}
          path: backups/*.sql.gz
          retention-days: 30
