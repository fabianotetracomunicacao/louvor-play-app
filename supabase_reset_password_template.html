<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="pt-BR">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperação de Senha - LouvorPlay</title>
</head>

<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f59e0b; background-image: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="min-height: 100vh;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 500px; background-color: #ffffff; border-radius: 24px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);">
                    <tr>
                        <td align="center" style="padding: 50px 40px;">
                            <!-- Header Logo Icon -->
                            <table border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 30px;">
                                <tr>
                                    <td align="center" style="width: 80px; height: 80px; background-color: #f59e0b; border-radius: 20px;">
                                        <img src="https://louvorplay.com.br/logo.png" alt="LouvorPlay Logo" width="60" style="display: block; border: 0;" />
                                    </td>
                                </tr>
                            </table>

                            <h1 style="color: #1a202c; font-size: 26px; font-weight: 900; margin: 0 0 15px 0; letter-spacing: -0.5px; line-height: 1.2;">Esqueceu a Senha?</h1>
                            <p style="color: #4a5568; font-size: 16px; margin: 0 0 30px 0; line-height: 1.6;">
                                Não se preocupe! Recebemos sua solicitação de redefinição para a conta no <strong>LouvorPlay</strong>.
                            </p>

                            <!-- Email Info Box -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #fffbeb; border: 2px dashed #fcd34d; border-radius: 16px; margin-bottom: 30px;">
                                <tr>
                                    <td style="padding: 20px; text-align: center; color: #92400e; font-size: 15px; font-weight: 500;">
                                        Conta:<br />
                                        <strong style="color: #b45309; font-size: 16px;">{{ .Email }}</strong>
                                    </td>
                                </tr>
                            </table>

                            <!-- Bulletproof Button -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center">
                                        <table border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td align="center" style="background-color: #f59e0b; border-radius: 14px;">
                                                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 18px 40px; font-family: Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 800; color: #ffffff; text-decoration: none; border-radius: 14px; background-color: #f59e0b;">
                                                        Redefinir Minha Senha
                                                    </a>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                            <!-- Spacing -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-top: 35px; border-top: 1px solid #e2e8f0;">
                                <tr>
                                    <td style="padding-top: 25px; color: #a0aec0; font-size: 13px; text-align: center; line-height: 1.5;">
                                        <p style="margin: 0 0 10px 0;">Se você não solicitou isso, pode ignorar este e-mail com segurança.</p>
                                        <p style="margin: 0; color: #b45309; font-weight: 600; font-size: 12px;">Atenção: Por segurança, este link expira em 1 hora.</p>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
